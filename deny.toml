# cargo-deny configuration for the moves.rs workspace.
#
# Run locally with `cargo deny check` after `cargo install cargo-deny`.
# CI runs the same check on every push.

[graph]
all-features = true

[advisories]
version = 2
# Treat yanked crates and unmaintained advisories as warnings; only hard-fail
# on active vulnerabilities. Anything more aggressive turns advisory churn
# into a CI tax that distracts from the port.
yanked = "warn"

[licenses]
version = 2
# Permissive licenses compatible with Apache-2.0 (moves.rs's own license).
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "ISC",
    "MIT",
    "MIT-0",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.93

[bans]
# Multiple versions of the same crate are common in mature dep graphs and
# rarely a real problem; warn so we notice but don't block builds.
multiple-versions = "warn"
wildcards = "deny"
# Intra-workspace path dependencies (`{ path = "..." }` without a version)
# get reported as wildcards by cargo-deny; that's the standard workspace
# pattern, so exempt them rather than litter the manifests with version
# pins we don't otherwise use.
allow-wildcard-paths = true
# polars 0.53 pulls older versions of several common crates alongside the
# newer versions used by the rest of the workspace.  Skip the older copies
# so the duplicate warnings don't fire; if polars updates its transitive
# deps these entries can be removed.
skip = [
    { name = "cpufeatures",   version = "=0.2.17" },
    { name = "foldhash",      version = "=0.1.5" },
    { name = "getrandom",     version = "=0.2.17" },
    { name = "getrandom",     version = "=0.3.4" },
    { name = "hashbrown",     version = "=0.15.5" },
    { name = "hashbrown",     version = "=0.16.1" },
    { name = "phf",           version = "=0.11.3" },
    { name = "phf_shared",    version = "=0.11.3" },
    { name = "quick-xml",     version = "=0.36.2" },
    { name = "r-efi",         version = "=5.3.0" },
    { name = "rand",          version = "=0.8.6" },
    { name = "rand",          version = "=0.9.4" },
    { name = "rand_core",     version = "=0.6.4" },
    { name = "rand_core",     version = "=0.9.5" },
    { name = "thiserror",     version = "=1.0.69" },
    { name = "thiserror-impl", version = "=1.0.69" },
    { name = "windows-link",  version = "=0.1.3" },
    { name = "windows-sys",   version = "=0.52.0" },
    { name = "windows-sys",   version = "=0.59.0" },
    { name = "wit-bindgen",   version = "=0.51.0" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
