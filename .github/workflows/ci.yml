# Fast Rust workspace CI — runs on every push and pull request.
#
# Scope:
#   * Cross-platform build + test matrix (Linux, macOS, Windows) — every
#     `cargo test --workspace` run includes the characterization-fixture
#     integration suite (full_suite_regression), the concurrency-correctness
#     sweep (N=1/4/NCPU), the NONROAD fidelity harness, and cargo-deny.
#   * WASM build gate — verifies that `moves-wasm` compiles for
#     `wasm32-unknown-unknown` and that the fixture subset embedded in
#     `moves-wasm`'s native unit tests passes on the host (catching
#     native-vs-WASM divergence at the logic level before the browser build
#     is exercised).
#
# What lives here vs. in the weekly workflow:
#   * HERE (per-push, pure Rust, GitHub-hosted): build/test on all platforms,
#     small-fixture characterization subset (full_suite_regression native
#     tests), concurrency N-sweep, NONROAD fidelity machinery, WASM build.
#   * WEEKLY (fixture-suite-weekly.yml, self-hosted, Apptainer): full
#     characterization suite against the pinned canonical-MOVES SIF + NONROAD
#     gfortran reference captures. Requires Apptainer + fakeroot + a local
#     MOVES build — not viable on GitHub-hosted runners.
#
# The `full_suite_regression` and `concurrency_correctness` tests run on
# every push without any external deps: they exercise the Rust port end-to-end
# over all 34 characterization fixtures (no MOVES SIF needed). When
# `REGRESSION_SNAPSHOTS_DIR` is set (weekly only), those same tests also diff
# against the canonical-MOVES snapshot baseline.

name: ci

on:
  push:
    branches: ["**"]
  pull_request:
  # Allow package-default-db.yml (and maintainers) to trigger the docs+Pages
  # job directly — e.g. to immediately publish a newly packaged default-DB
  # Parquet tree without waiting for the next code push.
  workflow_dispatch:

# Cancel earlier runs on the same ref so we always test the latest commit.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: cargo test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # rustfmt + clippy only run on Linux (the matrix entry that also
          # carries those steps). macOS/Windows only build and test.
          components: ${{ matrix.os == 'ubuntu-latest' && 'rustfmt, clippy' || '' }}

      - name: Cache cargo registry, target/
        uses: Swatinem/rust-cache@v2
        with:
          key: test-${{ matrix.os }}

      # ── Lints (Linux only — one canonical lint pass is enough) ───────────
      - name: cargo fmt --check
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --all -- --check

      - name: cargo clippy
        if: matrix.os == 'ubuntu-latest'
        # Cosmetic style lints are allowed workspace-wide (same policy as
        # doc_lazy_continuation): type_complexity (complex tuple types in the
        # generators) and unnecessary_map_or (map_or vs is_none_or/is_some_and).
        run: cargo clippy --workspace --all-targets -- -D warnings -A clippy::doc_lazy_continuation -A clippy::type_complexity -A clippy::unnecessary_map_or

      # ── Build + test (all platforms) ─────────────────────────────────────
      - name: cargo build
        run: cargo build --workspace --all-targets

      # cargo test --workspace exercises:
      #   * unit + integration tests in every crate
      #   * crates/moves-cli/tests/full_suite_regression.rs — runs all 34
      #     characterization fixtures (onroad + NONROAD) through the Rust port
      #     and asserts no panics, non-empty plans, and (when
      #     REGRESSION_SNAPSHOTS_DIR is set) snapshot-diff within tolerance.
      #     This is the "small-fixture characterization subset on PRs" gate.
      #   * crates/moves-cli/tests/concurrency_correctness.rs — runs every
      #     onroad fixture at N=1, N=4, and N=NCPU and asserts byte-identical
      #     output (catches concurrency regressions).
      #   * crates/moves-cli/tests/concurrency_tuning.rs — sweeps N and
      #     checks that throughput does not degrade + RSS stays bounded.
      #   * crates/moves-nonroad/tests/nonroad_fidelity.rs — NONROAD
      #     numerical-fidelity harness (machinery + live port output).
      #     When NONROAD_FIDELITY_REFERENCE is set (weekly self-hosted),
      #     this also diffs against the gfortran reference captures.
      - name: cargo test
        # --no-fail-fast: run every test binary even after one fails. Without it,
        # cargo stops at the first failing binary, which masked a 3-deep failure
        # chain on main (concurrency_correctness -> concurrency_tuning_sweep ->
        # canonical_snapshot_diff) and blinded merge-gating to snapshot regressions.
        run: cargo test --workspace --all-targets --no-fail-fast

  # ── WASM build gate ────────────────────────────────────────────────────────
  #
  # Builds `moves-wasm` for `wasm32-unknown-unknown` and runs its native unit
  # tests on the host. This catches:
  #
  #   1. Compilation failures on the WASM target (type errors, missing
  #      `std`/`alloc` items, C-compiled dependency pulled in accidentally).
  #
  #   2. Logic divergence between native and WASM builds at the pure-Rust
  #      level — the embedded-fixture tests in `moves-wasm::tests` run on
  #      the host and exercise the same logic the WASM module exposes to
  #      the browser, so a passing native test suite is a necessary (though
  #      not sufficient) condition for a correct WASM build.
  #
  # `cargo test -p moves-wasm` (native) runs the tests under `#[cfg(test)]`
  # in lib.rs without wasm-bindgen glue. `cargo build --target
  # wasm32-unknown-unknown` then compiles the cdylib for the browser target.
  # Full in-browser `wasm-bindgen-test` runs are left to the developer
  # environment (requires a headless browser + wasm-pack) because
  # GitHub-hosted runners do not have a stable headless-browser setup for
  # WASM test execution.
  wasm-build:
    name: WASM build (wasm32-unknown-unknown)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry, target/
        uses: Swatinem/rust-cache@v2
        with:
          key: wasm

      # Run the moves-wasm native tests first — these cover the fixture
      # subset (sample-runspec.xml onroad + NONROAD driver loop) and catch
      # logic bugs without needing a browser.
      - name: cargo test -p moves-wasm (native, fixture subset)
        run: cargo test -p moves-wasm

      # Compile the cdylib for the browser target. Excludes the whole
      # workspace (many crates have no wasm32 target) and targets only
      # moves-wasm, which already has WASM-safe dependency overrides
      # (parquet without C codecs, etc.).
      - name: cargo build --target wasm32-unknown-unknown -p moves-wasm
        run: >
          cargo build
          --target wasm32-unknown-unknown
          -p moves-wasm

  docs:
    name: cargo doc
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry, target/
        uses: Swatinem/rust-cache@v2
        with:
          key: docs

      - name: cargo doc (warnings deny)
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps

      - name: Copy docs index
        if: github.ref == 'refs/heads/main'
        run: cp static/docs-index.html target/doc/index.html

      # Build the WASM browser demo and fold it into the Pages artifact under
      # /demo/, so the single GitHub Pages deploy serves both the cargo docs
      # (at the root) and the hosted WASM demo (at /demo/).
      - name: Install wasm32 target + wasm-pack
        if: github.ref == 'refs/heads/main'
        run: |
          rustup target add wasm32-unknown-unknown
          cargo install wasm-pack --locked

      - name: Build WASM demo into docs/demo
        if: github.ref == 'refs/heads/main'
        run: |
          wasm-pack build --target web crates/moves-wasm
          mkdir -p target/doc/demo/pkg
          cp crates/moves-wasm/demo/index.html target/doc/demo/
          cp crates/moves-wasm/demo/worker.js  target/doc/demo/
          cp crates/moves-wasm/demo/README.md  target/doc/demo/
          cp crates/moves-wasm/pkg/moves_wasm.js      target/doc/demo/pkg/
          cp crates/moves-wasm/pkg/moves_wasm_bg.wasm target/doc/demo/pkg/

      # Download the most recent default-DB Parquet tree from GitHub Releases
      # and extract it into target/doc/demo/data/<db_version>/ so the WASM
      # demo (served at /demo/) can fetch individual partitions same-origin at
      # predictable URLs like /demo/data/<db_version>/manifest.json or
      # /demo/data/<db_version>/IMCoverage/year=2020/county=06037/part.parquet.
      #
      # The release archive includes an intermediate _tsv/ dump directory that
      # is only needed for validation and is excluded here to avoid bloating the
      # Pages artifact (~390 MB total without _tsv/).
      #
      # Skips gracefully when no release with a default-db asset exists yet
      # (first deployment before package-default-db has ever been run).
      - name: Download latest default-DB Parquet tree for Pages
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # gh release list does not expose an "assets" field, so query each
          # release's assets via `gh release view`. Find the most recent release
          # carrying a default-db-*.tar.gz asset; skip gracefully if none.
          TAG=""
          ARCHIVE=""
          for t in $(gh release list --limit 20 --json tagName --jq '.[].tagName' 2>/dev/null || true); do
            a=$(gh release view "$t" --json assets --jq '.assets[].name' 2>/dev/null \
                | grep -E '^default-db-.*\.tar\.gz$' | head -1) || true
            if [ -n "$a" ]; then TAG="$t"; ARCHIVE="$a"; break; fi
          done
          if [ -z "$TAG" ]; then
            echo "No default-DB release found — skipping (run package-default-db first)"
            exit 0
          fi
          DB_VERSION="${ARCHIVE#default-db-}"
          DB_VERSION="${DB_VERSION%.tar.gz}"
          echo "Downloading ${ARCHIVE} from release ${TAG}..."
          gh release download "${TAG}" -p "${ARCHIVE}" -D /tmp/
          mkdir -p target/doc/demo/data
          tar -xzf "/tmp/${ARCHIVE}" \
            --exclude="${DB_VERSION}/_tsv" \
            -C target/doc/demo/data/
          rm -f "/tmp/${ARCHIVE}"
          echo "Published default-DB ${DB_VERSION} at demo/data/${DB_VERSION}/"
          du -sh "target/doc/demo/data/${DB_VERSION}/"
          # Write a pointer file so the demo JS can discover the latest DB version.
          echo "{\"db_version\":\"${DB_VERSION}\"}" > target/doc/demo/data/latest.json

      - name: Upload docs artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/doc

  deploy-pages:
    name: Deploy to GitHub Pages
    needs: docs
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: cargo deny check
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          log-level: warn
