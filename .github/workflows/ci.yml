# Fast Rust workspace CI — runs on every push and pull request.
#
# Scope: build, unit + integration tests, rustfmt, clippy. The slow
# fixture-snapshot regression (against a pinned canonical-MOVES SIF) lives in
# .github/workflows/fixture-suite-weekly.yml because it requires Apptainer +
# a self-hosted runner and is not appropriate for the per-push gate.

name: ci

on:
  push:
    branches: ["**"]
  pull_request:

# Cancel earlier runs on the same ref so we always test the latest commit.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry, target/
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo build
        run: cargo build --workspace --all-targets

      - name: cargo test
        run: cargo test --workspace --all-targets

      - name: cargo doc (warnings deny)
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps
