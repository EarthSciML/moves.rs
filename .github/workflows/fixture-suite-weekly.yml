# Weekly fixture-suite regression check (GitHub-hosted).
#
# Runs every Monday morning UTC against the pinned canonical-MOVES SIF.
# Re-runs the fixture suite and diffs each produced snapshot against the
# committed baseline under characterization/snapshots/. Any drift signals
# one of:
#
#   1. Upstream MOVES changed (new EPA release, patched JAR, default-DB
#      schema bump). The diff tells us which tables / cells moved.
#   2. Determinism contract broken (timestamp leaked into output, sort
#      order shifted, parquet writer settings drifted). Treat as a bug.
#   3. Build host divergence (gfortran flags, MariaDB version, Apptainer
#      version). Investigate before pinning a new SIF SHA.
#
# Topology — three jobs:
#
#   build-sif        — builds the canonical-MOVES SIF once via the shared
#                      composite action (.github/actions/build-sif), then
#                      uploads it as an artifact so the fixture shards can
#                      pull it without each rebuilding the 1.1 GB image.
#                      Runs on a GitHub-hosted ubuntu-24.04 runner; the
#                      fakeroot build works through unprivileged user
#                      namespaces.
#
#   fixture-suite    — canonical-MOVES snapshot regression for all 34
#                      characterization fixtures (the 3 scale-* fixtures
#                      need extra input DBs and are skipped by default).
#                      Sharded across a 5-way matrix so each runner does
#                      ~7 fixtures and stays well under the 6 h per-job
#                      cap. Each shard downloads the canonical SIF, derives
#                      the patched fixture SIF from it (build-fixture-sif.sh
#                      bootstraps from the canonical image — a layering
#                      build that re-runs `ant compileall` on the patched
#                      MOVES sources, not a from-scratch bootstrap), runs
#                      only its shard, and diffs against baseline. Fails on
#                      any drift beyond tolerance.toml.
#
#   nonroad-fidelity — NONROAD numerical-fidelity check. UNCHANGED from the
#                      self-hosted design: it builds an instrumented
#                      gfortran NONROAD binary and runs against the
#                      canonical SIF with NRDBG_FILE set. This cannot run on
#                      GitHub-hosted runners (it needs gfortran + builds a
#                      Fortran binary against the pinned MOVES tree), so it
#                      stays on the self-hosted [apptainer, fakeroot,
#                      gfortran] labels and builds its own canonical SIF
#                      (cache-first). It is independent of the two
#                      GitHub-hosted jobs above (no `needs:`), because a
#                      self-hosted job must not gate on GitHub-hosted runner
#                      availability or on the 1-day fixture-SIF artifact.
#
# Disk note (GitHub-hosted jobs): Apptainer scratch (APPTAINER_TMPDIR /
# APPTAINER_CACHEDIR) is placed on the roomy root disk (GITHUB_WORKSPACE,
# on /, ~22-29 GB free), NOT on RUNNER_TEMP (/mnt, the ~14 GB secondary
# disk). The from-scratch canonical build and the layering fixture build
# both need several GB of sandbox; /mnt is too small.
#
# Why two SIFs (canonical + fixture): canonical-moves.sif is the immutable
# reference whose SHA256 pins the whole migration's baseline. The snapshot
# suite runs the *fixture* SIF (moves-fixture.sif = canonical + the
# intermediate-state-capture patch); run-fixture.sh and the
# moves-fixture-capture --sif-lockfile both consume it. So the shards build
# moves-fixture.sif locally from the downloaded canonical SIF.

name: fixture-suite-weekly

on:
  schedule:
    # 06:00 UTC every Monday — quiet hour for North-American operators.
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      include_pattern:
        description: "Glob fed to run-all-fixtures.sh --include (default: all). NOTE: when set, this filters within each shard; the matrix still fans out 5 ways."
        required: false
        default: ""
      tolerance_config:
        description: "Path to TOML tolerance config (relative to repo root)"
        required: false
        default: "characterization/tolerance.toml"
      skip_nonroad_fidelity:
        description: "Set to 'true' to skip the NONROAD fidelity job"
        required: false
        default: "false"

# Cancel a running suite if a fresh schedule fires before it finishes.
concurrency:
  group: fixture-suite-weekly
  cancel-in-progress: false

jobs:
  # ── Build the canonical SIF once and publish it as an artifact ────────────
  build-sif:
    name: build canonical SIF
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      # Shared composite action: installs Apptainer, restores/saves the SIF
      # cache, builds (cache-first) onto the roomy root disk, and leaves
      # the SIF at characterization/apptainer/canonical-moves.sif.
      - uses: ./.github/actions/build-sif

      # Hand the built SIF to the fixture-suite shards. retention-days: 1 —
      # this artifact is a within-run handoff, not a durable deliverable.
      - name: Upload canonical SIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: canonical-moves-sif
          path: characterization/apptainer/canonical-moves.sif
          if-no-files-found: error
          retention-days: 1

  # ── Sharded fixture suite ─────────────────────────────────────────────────
  fixture-suite:
    name: fixture-suite (shard ${{ matrix.shard }}/5)
    needs: build-sif
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        # 5 shards over 34 runnable fixtures ⇒ ~7 per shard (7/7/7/7/6).
        # Round-robin spreads the heavier fixtures evenly: the 10 nr-*
        # NONROAD fixtures land 2 per shard and the 6 expand-* multi-
        # county/month fixtures land 1-2 per shard, so no single shard
        # piles up the slow ones. Sized so the slowest shard (≤7 fixtures
        # × ≤10 min ≈ 70 min, plus the one-time fixture-SIF layering build
        # — an `ant compileall` recompile, est. 30-40 min, UNMEASURED on a
        # GitHub-hosted runner — and the SIF download + cargo build ≈ 20
        # min ⇒ ~2-2.5 h) stays comfortably under the 6 h cap. Going wider
        # mostly multiplies the per-shard fixture-SIF build cost for little
        # wall-clock gain, so 5 is the balance point.
        shard: [1, 2, 3, 4, 5]
    env:
      SHARDS: 5

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry, target/
        uses: Swatinem/rust-cache@v2

      - name: Build moves-snapshot CLI
        run: cargo build --release --workspace --bin moves-snapshot

      # The fixture shards consume Apptainer directly (they do NOT rebuild
      # the canonical SIF — they download it). Install Apptainer and point
      # its scratch at the roomy root disk for the fixture-SIF layering
      # build and the per-fixture container runs.
      - name: Install Apptainer
        uses: eWaterCycle/setup-apptainer@v2

      # Apptainer scratch goes on the roomy root disk (GITHUB_WORKSPACE, on
      # /), NOT on RUNNER_TEMP (/mnt is only ~14 GB). The `ant compileall`
      # layering build plus squashfs assembly of the 1.1 GB fixture SIF
      # needs several GB of sandbox.
      - name: Point Apptainer scratch at the roomy root disk
        run: |
          echo "APPTAINER_TMPDIR=${{ github.workspace }}/.apptainer-scratch" >> "${GITHUB_ENV}"
          echo "APPTAINER_CACHEDIR=${{ github.workspace }}/.apptainer-scratch" >> "${GITHUB_ENV}"
          mkdir -p "${{ github.workspace }}/.apptainer-scratch"

      # Pull the canonical SIF built by the build-sif job into the apptainer
      # dir, exactly where build-fixture-sif.sh and run-fixture.sh expect it.
      - name: Download canonical SIF artifact
        uses: actions/download-artifact@v4
        with:
          name: canonical-moves-sif
          path: characterization/apptainer/

      # Derive the patched fixture SIF (moves-fixture.sif) from the
      # downloaded canonical SIF. This is a layering build (From: localimage
      # canonical-moves.sif + the intermediate-state-capture patch, then
      # `ant compileall`), not a from-scratch bootstrap.
      - name: Build fixture SIF from canonical
        run: characterization/apptainer/build-fixture-sif.sh

      # Run ONLY this shard's slice of the suite. --shard I/N partitions the
      # script's own resolved fixture list (round-robin), so the union of
      # shards 1..5 is exactly the 34-fixture default set with the scale-*
      # fixtures correctly excluded — no fixture dropped or doubled.
      # include_pattern (if provided) further filters within the shard.
      - name: Run the fixture suite (shard ${{ matrix.shard }}/${{ env.SHARDS }})
        env:
          INCLUDE: ${{ github.event.inputs.include_pattern }}
        run: |
          mkdir -p artifacts/snapshots-fresh
          INCLUDE_ARG=""
          if [ -n "${INCLUDE:-}" ]; then INCLUDE_ARG="--include ${INCLUDE}"; fi
          characterization/run-all-fixtures.sh \
              --fakeroot \
              --keep-going \
              --shard "${{ matrix.shard }}/${SHARDS}" \
              --output-root artifacts/snapshots-fresh \
              ${INCLUDE_ARG}

      - name: Diff each fresh snapshot against the committed baseline
        env:
          TOLERANCE: ${{ github.event.inputs.tolerance_config || 'characterization/tolerance.toml' }}
        run: |
          set -u
          mkdir -p artifacts/diffs
          BIN="$(pwd)/target/release/moves-snapshot"
          TOL_FLAG=""
          if [ -n "${TOLERANCE}" ] && [ -f "${TOLERANCE}" ]; then
              TOL_FLAG="--tolerance ${TOLERANCE}"
          fi

          # Track exit codes so a single drifted fixture doesn't mask
          # other drifted fixtures in the same shard.
          drift=0
          shopt -s nullglob
          for fresh in artifacts/snapshots-fresh/*/; do
              name="$(basename "${fresh}")"
              baseline="characterization/snapshots/${name}"
              if [ ! -d "${baseline}" ]; then
                  echo "::warning::no committed baseline for ${name} — skipping"
                  continue
              fi
              echo "::group::diff ${name}"
              if ! "${BIN}" diff "${baseline}" "${fresh}" \
                      --format json ${TOL_FLAG} \
                      > "artifacts/diffs/${name}.json"; then
                  drift=1
                  echo "::error::snapshot drift in ${name}"
                  "${BIN}" diff "${baseline}" "${fresh}" \
                      --format text ${TOL_FLAG} || true
              fi
              echo "::endgroup::"
          done
          exit "${drift}"

      - name: Upload diff artifacts (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          # Per-shard artifact name so the 5 shards don't collide.
          name: fixture-diffs-shard-${{ matrix.shard }}
          path: |
            artifacts/diffs/*.json
            artifacts/snapshots-fresh/*/manifest.json
            artifacts/snapshots-fresh/*/provenance.json
          if-no-files-found: warn
          retention-days: 30

  # ── NONROAD numerical-fidelity job ────────────────────────────────────────
  #
  # Builds the locally-fixed gfortran NONROAD binary (the "phase0-02"
  # flag set from characterization/nonroad-build/flags.env), runs each
  # NONROAD fixture through the canonical-MOVES SIF with NRDBG_FILE set
  # to capture intermediate state (population, age distribution, growth,
  # emissions), then exercises the Rust port's fidelity harness against
  # those captures.
  #
  # The job needs gfortran for the instrumented NONROAD build, so it
  # carries the extra `gfortran` label. If a runner without gfortran picks
  # up the job it will fail the prerequisite check clearly rather than
  # silently skipping.
  #
  # This job stays on self-hosted runners (it cannot run on GitHub-hosted
  # ones) and is INDEPENDENT of the GitHub-hosted build-sif / fixture-suite
  # jobs: it builds its own canonical SIF (cache-first; build-sif.sh no-ops
  # when characterization/canonical-image.lock already matches on the
  # runner) rather than consuming the 1-day fixture-suite artifact.
  #
  # When to expect failures:
  #   * A new divergence between the Rust port and gfortran reference that
  #     exceeds the tolerance budget in tolerance.rs — file a bug.
  #   * A gfortran version change on the runner host that shifts numerical
  #     results — pin the gfortran version on the runner or widen tolerance
  #     for that label with documentation.
  #   * The MOVES source drifted at the pinned commit (almost impossible
  #     with pinned SHAs, but validate if gfortran build fails).
  nonroad-fidelity:
    name: NONROAD fidelity (gfortran reference)
    runs-on: [self-hosted, apptainer, fakeroot, gfortran]
    timeout-minutes: 240
    if: ${{ github.event.inputs.skip_nonroad_fidelity != 'true' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry, target/
        uses: Swatinem/rust-cache@v2
        with:
          key: nonroad-fidelity

      # Build the canonical SIF on this self-hosted runner (cache-first).
      # build-sif.sh is a no-op when canonical-image.lock already points at
      # a built image, so this is fast on a warm runner. Required because
      # this job no longer depends on a job that builds the SIF for it.
      - name: Build canonical SIF (cache-first)
        run: characterization/apptainer/build-sif.sh

      # The gfortran label on the runner guarantees gfortran is on PATH.
      # This step verifies the version so it appears in the log for
      # debugging flag-regression issues.
      - name: Verify gfortran availability
        run: gfortran --version

      # Shallow-clone the MOVES source at the pinned commit so build.sh
      # can compile the instrumented NONROAD binary on the host.
      # We use fetch-by-SHA (depth=1 of the specific commit) which avoids
      # downloading full history while still landing exactly the right tree.
      - name: Clone MOVES source at pinned commit
        run: |
          . characterization/apptainer/files/versions.env
          mkdir -p /tmp/moves-nonroad-src
          git -C /tmp/moves-nonroad-src init
          git -C /tmp/moves-nonroad-src remote add origin "${MOVES_REPO_URL}"
          git -C /tmp/moves-nonroad-src fetch --depth 1 origin "${MOVES_COMMIT}"
          git -C /tmp/moves-nonroad-src checkout FETCH_HEAD
          echo "[nonroad-fidelity] MOVES commit: $(git -C /tmp/moves-nonroad-src rev-parse HEAD)"

      # Build the instrumented NONROAD binary.
      # characterization/nonroad-build/build.sh applies the four dbgemit
      # patches and compiles with the pinned flag set from flags.env.
      # The resulting binary writes TSV captures when NRDBG_FILE is set.
      - name: Build instrumented NONROAD binary (phase0-02 flags)
        run: |
          characterization/nonroad-build/build.sh /tmp/moves-nonroad-src
          BINARY="/tmp/moves-nonroad-src/NONROAD/NR08a/NONROAD.exe"
          echo "NONROAD_EXE=${BINARY}" >> "${GITHUB_ENV}"
          echo "[nonroad-fidelity] built: $(sha256sum "${BINARY}")"

      # Run each nr-*.xml fixture through the canonical-MOVES SIF with:
      #   * the instrumented host binary bind-mounted over the SIF binary
      #   * NRDBG_FILE pointed at a bind-mounted output directory
      # Each fixture produces a TSV under artifacts/nonroad-fidelity-ref/.
      # The step runs --keep-going (continues after single-fixture failures)
      # so the artifact upload always produces a useful partial result.
      - name: Generate NONROAD gfortran reference captures
        run: |
          set -u
          SIF="characterization/apptainer/canonical-moves.sif"
          FIXTURES_DIR="characterization/fixtures"
          OUT_DIR="$(pwd)/artifacts/nonroad-fidelity-ref"
          mkdir -p "${OUT_DIR}"

          fail=0
          for fixture in "${FIXTURES_DIR}"/nr-*.xml; do
              name="$(basename "${fixture}" .xml)"
              WORKDIR="/scratch/${USER}/moves-nonroad-cap/${name}"
              NRDBG_DIR="${WORKDIR}/nrdbg-out"
              mkdir -p "${WORKDIR}/mariadb-data" \
                       "${WORKDIR}/run-mysqld" \
                       "${WORKDIR}/MOVESTemporary" \
                       "${WORKDIR}/WorkerFolder" \
                       "${NRDBG_DIR}"

              echo "::group::NONROAD capture ${name}"

              # Run the fixture through the SIF with:
              #   1. Instrumented NONROAD.exe bind-mounted over the SIF's binary
              #   2. NRDBG_DIR bind-mounted to /tmp/nrdbg-out inside the container
              #   3. NRDBG_FILE=/tmp/nrdbg-out/<name>.tsv so the Fortran
              #      writes the capture into our host-side directory
              #   4. The fixture XML bind-mounted to testdata/ inside MOVES
              apptainer exec --fakeroot \
                  --bind "${WORKDIR}/mariadb-data:/var/lib/mysql" \
                  --bind "${WORKDIR}/run-mysqld:/var/run/mysqld" \
                  --bind "${WORKDIR}/MOVESTemporary:/opt/moves/MOVESTemporary" \
                  --bind "${WORKDIR}/WorkerFolder:/opt/moves/WorkerFolder" \
                  --bind "${NONROAD_EXE}:/opt/moves/NONROAD/NR08a/NONROAD.exe" \
                  --bind "${NRDBG_DIR}:/tmp/nrdbg-out" \
                  --bind "$(realpath "${fixture}"):/opt/moves/testdata/${name}.xml" \
                  --env "NRDBG_FILE=/tmp/nrdbg-out/${name}.tsv" \
                  "${SIF}" \
                  bash -c "
                      set -eu
                      /opt/moves-bin/init-mariadb.sh
                      service mariadb start
                      for i in \$(seq 1 60); do
                          [ -S /var/run/mysqld/mysqld.sock ] && break
                          sleep 1
                      done
                      cd /opt/moves
                      ant crun -Drunspec=testdata/${name}.xml
                      service mariadb stop || true
                  " || {
                  echo "::warning::NONROAD run failed for ${name}"
                  fail=1
              }

              # Copy the capture to the shared output dir.
              TSV="${NRDBG_DIR}/${name}.tsv"
              if [ -f "${TSV}" ]; then
                  cp "${TSV}" "${OUT_DIR}/${name}.tsv"
                  echo "[nonroad-fidelity] captured $(wc -l < "${OUT_DIR}/${name}.tsv") lines for ${name}"
              else
                  echo "::warning::no capture produced for ${name} (NRDBG_FILE not written)"
              fi
              echo "::endgroup::"
          done
          exit "${fail}"

      # Run the NONROAD fidelity harness against the gfortran captures.
      # NONROAD_FIDELITY_REFERENCE triggers the live reference-vs-port diff
      # in crates/moves-nonroad/tests/fidelity/reference.rs.
      # Any divergence that exceeds the tolerance budget in tolerance.rs
      # fails the test and fails this CI step.
      - name: Run NONROAD fidelity harness (port vs. gfortran)
        run: |
          NONROAD_FIDELITY_REFERENCE="$(pwd)/artifacts/nonroad-fidelity-ref" \
              cargo test -p moves-nonroad --test nonroad_fidelity -- --nocapture

      - name: Upload NONROAD fidelity artifacts (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nonroad-fidelity-captures
          path: artifacts/nonroad-fidelity-ref/*.tsv
          if-no-files-found: warn
          retention-days: 14

