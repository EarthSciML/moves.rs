# Deploy the moves.rs WebAssembly browser demo to GitHub Pages.
#
# Trigger: push to main, gated behind a successful `ci` workflow run.
# The gate prevents a broken WASM build from clobbering the live demo.
#
# What this does:
#   1. Waits for the CI workflow (`ci.yml`) to pass on the same commit.
#   2. Builds the WASM package with `wasm-pack --target web`.
#   3. Assembles a deploy directory from the demo assets + generated `pkg/`.
#   4. Pushes that directory to the `gh-pages` branch via
#      `JamesIves/github-pages-deploy-action`.
#
# Manual repo-settings step (one-time, done by a repo admin):
#   GitHub repo → Settings → Pages → Source → "Deploy from a branch"
#   → branch: `gh-pages`, folder: `/ (root)`.
#   The live URL will be https://earthsciml.github.io/moves.rs/
#
# The demo expects the wasm-pack output (pkg/) to be co-located under
# `crates/moves-wasm/demo/pkg/` relative to the page root.  The deploy
# step builds exactly that layout.

name: deploy-wasm-demo

on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]
    branches: [main]

# Allow only one concurrent deploy; cancel any in-progress run if a new
# commit lands so we always publish the latest main.
concurrency:
  group: deploy-wasm-demo
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  deploy:
    name: Build WASM demo and deploy to gh-pages
    # Gate: only run if the triggering CI run succeeded.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push to the gh-pages branch

    steps:
      - name: Checkout main at the commit that triggered CI
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install Rust toolchain + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry, target/
        uses: Swatinem/rust-cache@v2
        with:
          key: wasm-deploy

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      # Build the WASM package.  Output lands in crates/moves-wasm/pkg/:
      #   moves_wasm.js          — JS glue (ES module)
      #   moves_wasm_bg.wasm     — WASM binary
      #   moves_wasm_bg.js       — bindgen internal
      #   package.json / *.d.ts  — npm metadata (not used by the demo)
      - name: Build WASM package (wasm-pack --target web)
        run: wasm-pack build --target web crates/moves-wasm

      # Assemble the deploy root:
      #   <root>/index.html            ← redirect or landing page
      #   <root>/demo/index.html       ← the demo page
      #   <root>/demo/worker.js        ← Web Worker
      #   <root>/demo/pkg/             ← wasm-pack output
      #
      # The worker.js imports from "./pkg/moves_wasm.js", so pkg/ must sit
      # beside worker.js — i.e. under demo/.
      - name: Assemble deploy directory
        run: |
          mkdir -p deploy/demo/pkg

          # Demo HTML + worker
          cp crates/moves-wasm/demo/index.html deploy/demo/
          cp crates/moves-wasm/demo/worker.js  deploy/demo/
          cp crates/moves-wasm/demo/README.md  deploy/demo/

          # wasm-pack output (JS glue + WASM binary)
          cp crates/moves-wasm/pkg/moves_wasm.js      deploy/demo/pkg/
          cp crates/moves-wasm/pkg/moves_wasm_bg.wasm deploy/demo/pkg/
          cp crates/moves-wasm/pkg/moves_wasm_bg.js   deploy/demo/pkg/

          # Root redirect so https://earthsciml.github.io/moves.rs/ → /demo/
          cat > deploy/index.html <<'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta http-equiv="refresh" content="0; url=demo/">
            <title>moves.rs — redirecting to demo</title>
          </head>
          <body>
            <p>Redirecting to <a href="demo/">demo/</a>…</p>
          </body>
          </html>
          HTML

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: deploy
          clean: true
          # Preserve any extra files that might have been pushed manually.
          clean-exclude: |
            .nojekyll
