# Composite action: build the canonical-MOVES SIF (cache-first).
#
# The single source of GitHub-hosted SIF building for every workflow that
# needs the canonical image: fixture-suite-weekly (its build-sif job),
# package-default-db, and upstream-update all invoke it via
# `- uses: ./.github/actions/build-sif`. It owns setup-apptainer, the
# AppArmor unprivileged-userns fix, an actions/cache layer, and runner-disk
# scratch wiring — kept in one place so all three stay in lockstep.
#
# Contract (do not change without updating the consumer):
#   * No inputs.
#   * Installs Apptainer via eWaterCycle/setup-apptainer@v2, then lifts the
#     ubuntu-24.04 default AppArmor restriction on unprivileged user
#     namespaces so `apptainer build --fakeroot` can run (apptainer#2027).
#   * Restores+saves an actions/cache@v4 of the built SIF, keyed on the
#     hash of every input that determines the image bytes: the def, the
#     pinned files/ (versions.env, my.cnf, init/start scripts, the capture
#     patch), the build wrapper, AND characterization/nonroad-build/** —
#     the def's %files stage copies nonroad-build into the build context
#     and %post runs nonroad-build/build.sh, so its contents (Fortran
#     sources, the dbgemit patches, flags.env) are baked into the SIF and
#     MUST be in the key or a Fortran-side edit serves a stale cached SIF.
#     A cache hit short-circuits the multi-hour build; build-sif.sh itself
#     is also a no-op when characterization/canonical-image.lock already
#     matches.
#   * Points APPTAINER_TMPDIR and APPTAINER_CACHEDIR at scratch ON THE
#     ROOMY ROOT DISK ($GITHUB_WORKSPACE, which lives on /, ~72-84 GB with
#     ~22-29 GB free on a fresh runner). It deliberately does NOT use
#     ${{ runner.temp }}: RUNNER_TEMP is mounted on /mnt, the ~14 GB
#     secondary disk (~10 GB usable after the 4 GB swap file), which is far
#     too small for an Apptainer from-scratch build sandbox — the unpacked
#     ubuntu:24.04 rootfs + apt caches + the full MOVES git clone + the
#     ~390 MB movesdb dump + the squashfs assembly of the 1.1 GB SIF
#     together exceed /mnt's headroom and would fail with ENOSPC.
#   * Leaves the SIF at characterization/apptainer/canonical-moves.sif.
#
# DB-zip supply: build-sif.sh / the def resolve the movesdb zip in the
# order MOVESDB_LOCAL_PATH > database/Setup/<file>.zip inside the cloned
# MOVES tree > MOVESDB_URL. CI sets neither MOVESDB_LOCAL_PATH nor
# MOVESDB_URL (the latter is empty in files/versions.env), so the build
# relies on the in-MOVES-tree bundled zip (supply path #2). Its SHA256 is
# verified against the MOVESDB_SHA256 pin in either path, so this is safe
# IF the pinned EPA commit actually ships database/Setup/movesdb20241112.zip
# (unverified here — see the build-sif risk note in the review).

name: build-sif
description: >-
  Build the canonical-MOVES Apptainer SIF (cache-first) and leave it at
  characterization/apptainer/canonical-moves.sif.

runs:
  using: composite
  steps:
    - name: Install Apptainer
      uses: eWaterCycle/setup-apptainer@v2

    # ubuntu-24.04 sets kernel.apparmor_restrict_unprivileged_userns=1 by
    # default, which makes `apptainer build --fakeroot` fail with "Failed to
    # create user namespace: Permission denied" (apptainer#2027). Lift it —
    # the GitHub-hosted runner has passwordless sudo. Guarded so it is a
    # harmless no-op on kernels/images without the knob (e.g. 22.04).
    - name: Allow unprivileged user namespaces (fakeroot build)
      shell: bash
      run: |
        if [ -e /proc/sys/kernel/apparmor_restrict_unprivileged_userns ]; then
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
        fi

    # Restore (and, on cache miss, later save) the built SIF. The key
    # covers everything that determines the image bytes: the def file,
    # every pinned input under files/ (versions.env, my.cnf, init/start
    # scripts, the capture patch), the build wrapper, and the entire
    # nonroad-build/ tree that %post compiles into the image. Bumping any
    # of these changes the key and forces a rebuild.
    - name: Cache canonical SIF
      id: sif-cache
      uses: actions/cache@v4
      with:
        path: characterization/apptainer/canonical-moves.sif
        key: sif-${{ hashFiles('characterization/apptainer/canonical-moves.def','characterization/apptainer/files/*','characterization/apptainer/build-sif.sh','characterization/nonroad-build/**') }}

    # Build only on a cache miss. APPTAINER_TMPDIR / APPTAINER_CACHEDIR go
    # on the roomy root disk (GITHUB_WORKSPACE is on /, not the cramped
    # /mnt RUNNER_TEMP volume); build-sif.sh auto-detects fakeroot (setuid
    # is off on GitHub-hosted runners, so it uses --fakeroot).
    - name: Build canonical SIF
      if: steps.sif-cache.outputs.cache-hit != 'true'
      shell: bash
      env:
        APPTAINER_TMPDIR: ${{ github.workspace }}/.apptainer-scratch
        APPTAINER_CACHEDIR: ${{ github.workspace }}/.apptainer-scratch
      run: |
        mkdir -p "${APPTAINER_TMPDIR}"
        characterization/apptainer/build-sif.sh

    # On a cache hit the lockfile in the checkout may be stale relative to
    # the restored SIF; report the SHA of the SIF actually present so any
    # downstream step that reads canonical-image.lock can be cross-checked.
    # This is cheap and keeps provenance honest.
    - name: Report restored SIF
      if: steps.sif-cache.outputs.cache-hit == 'true'
      shell: bash
      run: |
        SIF=characterization/apptainer/canonical-moves.sif
        echo "[build-sif] restored cached SIF: $(sha256sum "${SIF}" | awk '{print $1}') ($(stat -c '%s' "${SIF}") bytes)"

